name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  portal-baseline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Backend Operations Governance
        env:
          NEXT_PUBLIC_APP_URL: https://portal.advnoemia.com.br
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-publishable-key
          SUPABASE_SECRET_KEY: ci-secret-key
          INTERNAL_API_SECRET: ci-internal-secret
          NOTIFICATIONS_PROVIDER: resend
          RESEND_API_KEY: ci-resend-key
          EMAIL_FROM: noreply@advnoemia.com.br
          NOTIFICATIONS_WORKER_SECRET: ci-worker-secret
          CRON_SECRET: ci-cron-secret
          MERCADO_PAGO_ACCESS_TOKEN: ci-mp-access-token
          MERCADO_PAGO_WEBHOOK_SECRET: ci-mp-webhook-secret
          NEXT_PUBLIC_MERCADO_PAGO_PUBLIC_KEY: ci-mp-public-key
          MERCADO_PAGO_WEBHOOK_ENFORCE_SIGNATURE: "true"
          TELEGRAM_BOT_TOKEN: ci-telegram-bot-token
          TELEGRAM_WEBHOOK_SECRET: ci-telegram-webhook-secret
        run: npm run operations:evidence:ci

      - name: Upload Backend Operations Evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-operations-evidence
          path: apps/portal-backend/.artifacts/operations/ci

      - name: Build
        run: npm run build
