project_id = "portal-backend"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[auth]
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = [
  "http://127.0.0.1:3000/auth/callback",
  "http://localhost:3000/auth/callback",
  "http://127.0.0.1:3000",
  "http://localhost:3000"
]

[auth.email]
enable_signup = true
enable_confirmations = false

[auth.email.smtp]
enabled = true
host = "inbucket"
port = 1025
user = "local"
pass = "local"
admin_email = "no-reply@advnoemia.local"
sender_name = "Noemia Paixao Advocacia"

[auth.email.template.invite]
subject = "Seu acesso ao portal juridico"
content_path = "./supabase/templates/invite.html"

[auth.email.template.recovery]
subject = "Redefina sua senha do portal"
content_path = "./supabase/templates/recovery.html"
