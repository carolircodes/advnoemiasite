<div
  style="
    background:#f5f1ea;
    padding:32px 16px;
    font-family:Georgia, 'Times New Roman', serif;
    color:#10201d;
  "
>
  <div
    style="
      max-width:640px;
      margin:0 auto;
      background:#ffffff;
      border-radius:28px;
      padding:32px;
      border:1px solid rgba(16,32,29,0.08);
      box-shadow:0 24px 64px rgba(16,32,29,0.08);
    "
  >
    <div
      style="
        display:inline-block;
        padding:8px 12px;
        border-radius:999px;
        background:rgba(142,106,59,0.08);
        color:#6f512c;
        font-size:12px;
        font-weight:700;
        letter-spacing:0.04em;
        text-transform:uppercase;
      "
    >
      Recuperacao de acesso
    </div>

    <h1 style="margin:16px 0 12px;font-size:32px;line-height:1;">
      Redefina sua senha com seguranca
    </h1>

    <p style="margin:0 0 18px;font-size:16px;line-height:1.7;color:#4f625d;">
      Recebemos uma solicitacao para redefinir a senha da sua area do cliente.
    </p>

    <div
      style="
        padding:18px 20px;
        border-radius:20px;
        background:#f8f4ee;
        border:1px solid rgba(16,32,29,0.08);
        font-size:15px;
        line-height:1.7;
      "
    >
      Use o link abaixo para escolher uma nova senha e retomar o acesso ao portal.
    </div>

    <div style="margin-top:24px;">
      <a
        href="{{ .RedirectTo }}?token_hash={{ .TokenHash }}&type=recovery&next=/auth/atualizar-senha"
        style="
          display:inline-block;
          padding:14px 22px;
          border-radius:999px;
          background:linear-gradient(135deg,#8e6a3b,#6f512c);
          color:#fffaf2;
          text-decoration:none;
          font-weight:700;
        "
      >
        Redefinir senha
      </a>
    </div>

    <p style="margin:24px 0 0;font-size:14px;line-height:1.7;color:#4f625d;">
      Se voce nao solicitou esta alteracao, ignore esta mensagem.
    </p>
  </div>
</div>
