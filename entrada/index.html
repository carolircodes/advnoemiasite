<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Atendimento Juridico Inteligente</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0b1a13;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      max-width: 500px;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.8;
      margin-bottom: 25px;
    }

    .btn {
      background: linear-gradient(135deg, #c6a75e, #e6c97a);
      color: #000;
      padding: 15px;
      border-radius: 10px;
      font-weight: bold;
      text-decoration: none;
      display: block;
    }

    .badge {
      font-size: 12px;
      opacity: 0.6;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1 id="titulo">Analisando seu caso...</h1>
    <p id="descricao">Estamos preparando as informacoes para voce.</p>

    <a id="cta" class="btn" href="/triagem.html">Continuar</a>

    <div class="badge">Atendimento juridico inteligente</div>
  </div>

  <script src="../assets/js/portal-origin.js"></script>
  <script src="../assets/js/entry-context.js"></script>
  <script>
    (function () {
      const EVENTS_API_PATH = "/api/public/events";
      const eventsApiBase = (window.__ADV_PORTAL_ORIGIN__ || window.location.origin).replace(/\/$/, "");
      const SESSION_STORAGE_KEY = "site_product_session_id";
      const SESSION_FLAG_PREFIX = "site_product_flag:";
      const params = new URLSearchParams(window.location.search);
      const entryContext = window.EntryContext
        ? window.EntryContext.readFromSearch(window.location.search, {
            defaults: {
              origem: "entrada"
            }
          })
        : {
            tema: (params.get("tema") || "").trim().toLowerCase(),
            origem: (params.get("origem") || "entrada").trim().toLowerCase(),
            campanha: (params.get("campanha") || params.get("campaign") || "").trim().toLowerCase(),
            video: (params.get("video") || "").trim().toLowerCase()
          };
      const tema = entryContext.tema || "";
      const origem = entryContext.origem || "entrada";
      const campanha = entryContext.campanha || "";
      const video = entryContext.video || "";

      const titulo = document.getElementById("titulo");
      const descricao = document.getElementById("descricao");
      const cta = document.getElementById("cta");

      const themeToArea = {
        aposentadoria: "previdenciario",
        previdenciario: "previdenciario",
        banco: "bancario",
        bancario: "bancario",
        familia: "familia",
        civil: "civil",
        consumidor: "consumidor",
        "consumidor-bancario": "consumidor-bancario"
      };

      function createSessionId() {
        if (typeof crypto !== "undefined" && crypto.randomUUID) {
          return crypto.randomUUID();
        }

        return "session-" + Date.now();
      }

      function getProductSessionId() {
        try {
          const stored = window.localStorage.getItem(SESSION_STORAGE_KEY);

          if (stored) {
            return stored;
          }

          const nextId = createSessionId();
          window.localStorage.setItem(SESSION_STORAGE_KEY, nextId);
          return nextId;
        } catch (error) {
          return createSessionId();
        }
      }

      function trackEvent(input) {
        const body = JSON.stringify({
          eventKey: input.eventKey,
          eventGroup: input.eventGroup || "conversion",
          pagePath: input.pagePath || "/entrada",
          sessionId: getProductSessionId(),
          payload: input.payload || {}
        });

        if (typeof navigator !== "undefined" && navigator.sendBeacon) {
          navigator.sendBeacon(
            new URL(EVENTS_API_PATH, eventsApiBase).toString(),
            new Blob([body], { type: "application/json" })
          );
          return;
        }

        void fetch(new URL(EVENTS_API_PATH, eventsApiBase).toString(), {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body
        }).catch(function () {
          return undefined;
        });
      }

      function trackEventOncePerSession(input) {
        const flagKey = SESSION_FLAG_PREFIX + input.eventKey;

        try {
          if (window.sessionStorage.getItem(flagKey)) {
            return;
          }

          window.sessionStorage.setItem(flagKey, "1");
        } catch (error) {
          // Continua mesmo sem sessionStorage.
        }

        trackEvent(input);
      }

      function buildNextHref() {
        const nextParams = new URLSearchParams();
        const mappedArea = themeToArea[tema] || "";

        if (tema) {
          nextParams.set("tema", tema);
        }

        nextParams.set("origem", origem || "entrada");
        nextParams.set("page", "entrada/index.html");

        if (mappedArea) {
          nextParams.set("area", mappedArea);
        }

        return window.EntryContext
          ? window.EntryContext.appendToHref("/triagem.html?" + nextParams.toString(), entryContext)
          : "/triagem.html?" + nextParams.toString();
      }

      trackEventOncePerSession({
        eventKey: "entry_page_viewed",
        eventGroup: "traffic",
        pagePath: "/entrada",
        payload: {
          tema: tema || "",
          origem: origem || "entrada",
          campanha: campanha || "",
          video: video || ""
        }
      });

      if (tema === "aposentadoria") {
        titulo.innerText = "Voce pode ter direito a valores nao recebidos";
        descricao.innerText =
          "Vou analisar sua situacao e te mostrar exatamente o que pode ser feito.";
      }

      if (tema === "banco") {
        titulo.innerText = "O banco pode estar te cobrando indevidamente";
        descricao.innerText = "Vamos verificar isso agora e entender o seu caso.";
      }

      if (tema === "familia") {
        titulo.innerText = "Seu caso precisa ser tratado com estrategia";
        descricao.innerText = "Vou te orientar da melhor forma possivel.";
      }

      const nextHref = buildNextHref();
      cta.href = nextHref;

      cta.addEventListener("click", function (event) {
        event.preventDefault();
        cta.textContent = "Continuando...";
        cta.setAttribute("aria-disabled", "true");
        cta.style.pointerEvents = "none";

        trackEvent({
          eventKey: "entry_continue_clicked",
          eventGroup: "conversion",
        pagePath: "/entrada",
        payload: {
          tema: tema || "",
          origem: origem || "entrada",
          campanha: campanha || "",
          video: video || "",
          destination: nextHref
        }
      });

        window.setTimeout(function () {
          window.location.assign(nextHref);
        }, 80);
      });
    })();
  </script>
</body>
</html>
