<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecionando para a area do cliente</title>
  <meta http-equiv="refresh" content="0; url=/auth/login" />
  <script>
    (function () {
      window.location.replace("/auth/login" + window.location.search + window.location.hash);
    })();
  </script>
</head>
<body>
  <p>Redirecionando para a area do cliente. Se nada acontecer, <a href="/auth/login">clique aqui</a>.</p>
</body>
</html>
